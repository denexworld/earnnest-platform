<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Earnest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f4f7f6; margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(to right, #004d40, #006064); color: white; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; font-size: 1.5rem; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; font-size: 14px; }
        .input-wrapper { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .reset-btn { width: 100%; background-color: #004d40; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .back-link { margin-top: 20px; display: block; color: #004d40; text-decoration: none; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #ef4444; color: white; padding: 12px 20px; border-radius: 10px; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { background: #10b981; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
    <script type="module">
        const firebaseConfig = {
  apiKey: "AIzaSyCLP5ppkhoba7o3lQo_leBbO_jzaVWNzg8",
  authDomain: "earnnest-8572a.firebaseapp.com",
  projectId: "earnnest-8572a",
  storageBucket: "earnnest-8572a.firebasestorage.app",
  messagingSenderId: "902250376019",
  appId: "1:902250376019:web:cbf3dfb67f02261a2f0fa6"
};
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        window.resetPassword = async () => {
            const email = document.getElementById('email').value;
            if (!email) {
                showToast('Please enter your email', 'error');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showToast('✅ Password reset email sent! Check your inbox.', 'success');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } catch (error) {
                if (error.code === 'auth/user-not-found') showToast('No account found with this email', 'error');
                else showToast(error.message, 'error');
            }
        };
    </script>
</head>
<body>
    <div class="card">
        <div class="header">EARNEST</div>
        <h2>FORGOT PASSWORD</h2>
        <p>Enter your registered email address, and we'll send you a link to reset your password.</p>
        <div class="input-wrapper">
            <input type="email" id="email" placeholder="Registered Email">
        </div>
        <button class="reset-btn" onclick="resetPassword()">RESET PASSWORD</button>
        <a href="index.html" class="back-link">← Back to Login</a>
    </div>
</body>
</html>
