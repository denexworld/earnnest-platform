<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Earnest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
        }
        .card { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .header { background: linear-gradient(to right, #004d40, #006064); color: white; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; font-size: 1.5rem; }
        h2 { color: #333; margin-bottom: 20px; }
        .input-wrapper { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .login-btn { width: 100%; background-color: #004d40; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .login-btn:hover { background-color: #006064; }
        .links { margin-top: 20px; font-size: 0.85rem; }
        .links a { color: #004d40; text-decoration: none; margin: 0 10px; }
        .links a:hover { text-decoration: underline; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #ef4444; color: white; padding: 12px 20px; border-radius: 10px; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { background: #10b981; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
    
    <script type="module">
         const firebaseConfig = {
  apiKey: "AIzaSyCLP5ppkhoba7o3lQo_leBbO_jzaVWNzg8",
  authDomain: "earnnest-8572a.firebaseapp.com",
  projectId: "earnnest-8572a",
  storageBucket: "earnnest-8572a.firebasestorage.app",
  messagingSenderId: "902250376019",
  appId: "1:902250376019:web:cbf3dfb67f02261a2f0fa6"
};
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        window.login = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.querySelector('.login-btn');
            
            if (!email || !password) {
                showToast('Please enter email and password', 'error');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerText = 'LOGGING IN...';
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('✅ Login successful!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                let errorMessage = '';
                switch (error.code) {
                    case 'auth/invalid-credential':
                        errorMessage = 'Invalid email or password';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = 'No account found';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Wrong password';
                        break;
                    default:
                        errorMessage = error.message;
                }
                showToast(errorMessage, 'error');
                loginBtn.disabled = false;
                loginBtn.innerText = 'LOGIN';
            }
        };
        
        window.forgotPassword = async () => {
            const email = prompt('Enter your email address:');
            if (!email) return;
            try {
                await sendPasswordResetEmail(auth, email);
                showToast('✅ Password reset email sent!', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            }
        };
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</head>
<body>
    <div class="card">
        <div class="header">EARNEST</div>
        <h2>WELCOME BACK</h2>
        
        <div class="input-wrapper">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Enter your email">
        </div>
        
        <div class="input-wrapper">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password">
        </div>
        
        <button class="login-btn" onclick="login()">LOGIN</button>
        
        <div class="links">
            <a href="#" onclick="forgotPassword()">Forgot Password?</a>
            <a href="register.html">Create Account</a>
        </div>
    </div>
</body>
</html>
